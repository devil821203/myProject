<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>YouTube Auto Skipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="container">
    <h1>YouTube Auto Skipper</h1>

    <section class="card">
      <label class="switch-row">
        <span>啟用自動略過</span>
        <input id="enabledToggle" type="checkbox">
      </label>
    </section>

    <section class="card">
      <h2>目前狀態</h2>

      <div class="status-row">
        <span>YouTube 分頁</span>
        <strong id="youtubeStatus">讀取中</strong>
      </div>

      <div class="status-row">
        <span>播放器</span>
        <strong id="playerStatus">讀取中</strong>
      </div>

      <div class="status-row">
        <span>廣告播放中</span>
        <strong id="adStatus">讀取中</strong>
      </div>

      <div class="status-row">
        <span>找到略過按鈕</span>
        <strong id="foundSkipStatus">讀取中</strong>
      </div>

      <div class="status-row">
        <span>可略過</span>
        <strong id="skipStatus">讀取中</strong>
      </div>
      
      <div class="status-row">
        <span>按鈕文字</span>
        <strong id="skipButtonText">無</strong>
      </div>     

      <div class="status-row">
        <span>錯誤訊息</span>
        <strong id="lastError">無</strong>
      </div>
      
      <div class="status-row">
        <span>已略過次數</span>
        <strong id="skipCount">0</strong>
      </div>

      <div class="status-message" id="lastAction">讀取中</div>
      <div class="checked-time" id="lastSkipAt"></div>
      <div class="checked-time" id="lastCheckedAt"></div>
    </section>

    <section class="card">
      <button id="refreshButton">重新偵測</button>
      <p id="statusText"></p>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
